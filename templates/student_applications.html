{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications - Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .student-layout {
            display: flex;
            min-height: 100vh;
        }
        .student-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-weight: 600;
        }
        .logout-btn {
            background: #dc2626;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: #b91c1c;
            color: white;
        }
        .student-sidebar {
            width: 260px;
            background: #1e3a8a;
            color: white;
            padding-top: 76px;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
        }
        .student-sidebar .navbar {
            flex-direction: column;
            padding: 0;
        }
        .student-sidebar .navbar-nav {
            flex-direction: column;
            width: 100%;
        }
        .student-sidebar .nav-link {
            color: white;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .student-sidebar .nav-link:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .student-sidebar .nav-link.active {
            background: #2563eb;
            font-weight: bold;
            color: white;
        }
        .student-main {
            margin-left: 260px;
            margin-top: 70px;
            padding: 40px;
            flex: 1;
            background: #f8fafc;
        }
        .section-title {
            margin: 0 0 20px 0;
            color: #1f2937;
            font-size: 24px;
        }
        .applications-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
        }
        .applications-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .applications-table thead {
            background: #1d4ed8;
            color: white;
        }
        .applications-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        .applications-table td {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
        }
        .applications-table tbody tr:hover {
            background: #f9fafb;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }
        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="student-layout">
        <nav class="navbar navbar-expand-lg bg-body-tertiary student-navbar">
            <div class="container-fluid">
                <a class="navbar-brand" href="/student/">Placement Management System</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    </ul>
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item">
                            <span class="nav-link">Hello, student (student)</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link logout-btn" href="/">Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <aside class="student-sidebar">
            <nav class="navbar navbar-expand-lg">
                <div class="container-fluid">
                    <div class="collapse navbar-collapse">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link {% if page == 'dashboard' %}active{% endif %}" aria-current="page" href="/student/">Dashboard</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if page == 'browse_jobs' %}active{% endif %}" href="/student/browse-jobs/">Browse Jobs</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if page == 'my_applications' %}active{% endif %}" href="/student/my-applications/">My Applications</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if page == 'my_profile' %}active{% endif %}" href="/student/my-profile/">My Profile</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </aside>

        <main class="student-main">
            <h2 class="section-title">My Applications</h2>
            <div class="applications-table">
                <table>
                    <thead>
                        <tr>
                            <th>Job Title</th>
                            <th>Company</th>
                            <th>Applied Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" class="no-data">No applications found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
