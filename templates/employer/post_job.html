{% extends "employer_base.html" %}

{% block employer_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h3>Post a New Job</h3>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Job Title</label>
                        <input type="text" name="title" class="form-control" placeholder="e.g. Software Engineer" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Location</label>
                        <input type="text" name="location" class="form-control" placeholder="e.g. Bangalore / Remote" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Salary Range</label>
                        <input type="text" name="salary" class="form-control" placeholder="e.g. ₹6-10 LPA" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Job Description</label>
                    <textarea name="description" class="form-control" rows="6" placeholder="Describe the roles, responsibilities, and requirements..." required></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">Post Job</button>
                    <a href="{% url 'employer_jobs' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
