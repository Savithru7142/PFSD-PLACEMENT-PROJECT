{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .student-layout {
            display: flex;
            min-height: 100vh;
        }
        .student-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-weight: 600;
        }
        .logout-btn {
            background: #dc2626;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: #b91c1c;
            color: white;
        }
        .student-sidebar {
            width: 260px;
            background: #1e3a8a;
            color: white;
            padding-top: 76px;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
        }
        .student-sidebar .navbar {
            flex-direction: column;
            padding: 0;
        }
        .student-sidebar .navbar-nav {
            flex-direction: column;
            width: 100%;
        }
        .student-sidebar .nav-link {
            color: white;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .student-sidebar .nav-link:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .student-sidebar .nav-link.active {
            background: #2563eb;
            font-weight: bold;
            color: white;
        }
        .student-main {
            margin-left: 260px;
            margin-top: 70px;
            padding: 40px;
            flex: 1;
            background: #f8fafc;
        }
        .section-title {
            margin: 0 0 20px 0;
            color: #1f2937;
            font-size: 24px;
        }
        .profile-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.07);
        }
        .profile-field {
            margin-bottom: 20px;
        }
        .profile-field label {
            display: block;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .profile-field input,
        .profile-field textarea {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 14px;
        }
        .profile-field textarea {
            min-height: 100px;
            resize: vertical;
        }
        .save-btn {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="student-layout">
        <nav class="navbar navbar-expand-lg bg-body-tertiary student-navbar">
            <div class="container-fluid">
                <a class="navbar-brand" href="/student/">Placement Management System</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    </ul>
                    <ul class="navbar-nav mb-2 mb-lg-0">
                        <li class="nav-item">
                            <span class="nav-link">Hello, student (student)</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link logout-btn" href="/">Logout</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <aside class="student-sidebar">
            <nav class="navbar navbar-expand-lg">
                <div class="container-fluid">
                    <div class="collapse navbar-collapse">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item">
                                <a class="nav-link {% if page == 'dashboard' %}active{% endif %}" aria-current="page" href="/student/">Dashboard</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if page == 'browse_jobs' %}active{% endif %}" href="/student/browse-jobs/">Browse Jobs</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if page == 'my_applications' %}active{% endif %}" href="/student/my-applications/">My Applications</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if page == 'my_profile' %}active{% endif %}" href="/student/my-profile/">My Profile</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </aside>

        <main class="student-main">
            <h2 class="section-title">My Profile</h2>
            <div class="profile-card">
                <div class="profile-field">
                    <label>Full Name</label>
                    <input type="text" value="student" readonly>
                </div>
                <div class="profile-field">
                    <label>Email</label>
                    <input type="email" value="student@example.com" readonly>
                </div>
                <div class="profile-field">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="Enter phone number">
                </div>
                <div class="profile-field">
                    <label>Address</label>
                    <textarea placeholder="Enter your address"></textarea>
                </div>
                <div class="profile-field">
                    <label>Education</label>
                    <input type="text" placeholder="Enter your education details">
                </div>
                <div class="profile-field">
                    <label>Skills</label>
                    <textarea placeholder="Enter your skills"></textarea>
                </div>
                <button class="save-btn">Save Changes</button>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
