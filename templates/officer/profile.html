{% extends "officer_base.html" %}

{% block officer_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h3>My Profile</h3>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title mb-4">Personal Information</h5>
            <hr>
            <div class="row mb-3">
                <div class="col-md-3 fw-bold border-start border-3 border-success ps-3">Name:</div>
                <div class="col-md-9 bg-light p-2 rounded">{{ user.get_full_name|default:user.username }}</div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-3 fw-bold border-start border-3 border-success ps-3">Email:</div>
                <div class="col-md-9 bg-light p-2 rounded">{{ user.email }}</div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-3 fw-bold border-start border-3 border-success ps-3">Role:</div>
                <div class="col-md-9 bg-light p-2 rounded text-capitalize">{{ user.profile.get_role_display|lower }}</div>
            </div>
            
            <div class="row mb-4">
                <div class="col-md-3 fw-bold border-start border-3 border-success ps-3">Phone:</div>
                <div class="col-md-9 bg-light p-2 rounded">9876543210</div>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary">Edit Profile</button>
                <button class="btn btn-info text-white">Change Password</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
