{% extends "admin_base.html" %}

{% block admin_content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <h3>My Profile</h3>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title border-bottom pb-2 mb-4">Personal Information</h5>
            
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">Name:</div>
                <div class="col-md-9 border-start ps-3">{{ user.get_full_name|default:user.username }}</div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">Email:</div>
                <div class="col-md-9 border-start ps-3">{{ user.email }}</div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-3 fw-bold">Role:</div>
                <div class="col-md-9 border-start ps-3 text-capitalize">{{ user.profile.role }}</div>
            </div>
            
            <div class="row mb-4">
                <div class="col-md-3 fw-bold">Phone:</div>
                <div class="col-md-9 border-start ps-3">9876543210</div> <!-- Placeholder as per screenshot -->
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-primary">Edit Profile</button>
                <button class="btn btn-info text-white">Change Password</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
